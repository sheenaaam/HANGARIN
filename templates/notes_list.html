{% extends 'base.html' %}
{% block content %}
<h2>Notes</h2>
<a href="{% url 'note_create' %}" class="btn btn-primary mb-2">Add Note</a>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>Task</th>
            <th>Content</th>
            <th>Created At</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for note in notes %}
        <tr>
            <td>{{ note.task.title }}</td>
            <td>{{ note.content }}</td>
            <td>{{ note.created_at|date:"M d, Y H:i" }}</td>
            <td>
                <a href="{% url 'note_update' note.id %}" class="btn btn-sm btn-warning">Edit</a>
                <a href="{% url 'note_delete' note.id %}" class="btn btn-sm btn-danger">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">No notes found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
