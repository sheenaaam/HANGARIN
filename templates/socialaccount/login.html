{% load i18n %} 
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
<title>Confirm {{ provider.name }} Login</title>

<!-- Same fonts & styling as dashboard -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* SAME GLASSMORPHISM DESIGN AS DASHBOARD & LOGIN */
:root {
    --primary: #8b5cf6;
    --primary-light: #a78bfa;
    --glass-bg: rgba(255, 255, 255, 0.25);
    --card-bg: rgba(255, 255, 255, 0.95);
    --text-primary: #1e293b;
    --text-secondary: #475569;
    --border: rgba(148, 163, 184, 0.3);
    --shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
}

* {
    font-family: 'Inter', sans-serif;
}

body {
    background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 2rem;
    position: relative;
    overflow: hidden;
}

body::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: 
        radial-gradient(circle at 20% 80%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(167, 139, 250, 0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
}

.auth-container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 500px;
}

.auth-card {
    background: var(--glass-bg);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid var(--border);
    border-radius: 28px;
    box-shadow: var(--shadow);
    padding: 3rem 2.5rem;
    width: 100%;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.auth-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--primary), var(--primary-light));
    border-radius: 28px 28px 0 0;
}

.auth-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 35px 70px rgba(0, 0, 0, 0.15);
}

.auth-icon {
    font-size: 4rem;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 1.5rem;
    display: block;
}

.confirm-title {
    font-size: 2.2rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 1rem;
    line-height: 1.2;
}

.confirm-text {
    color: var(--text-secondary);
    font-size: 1.1rem;
    font-weight: 400;
    margin-bottom: 2.5rem;
    line-height: 1.6;
}

.provider-name {
    color: var(--primary);
    font-weight: 600;
}

/* Buttons */
.confirm-btn {
    background: linear-gradient(135deg, var(--primary), var(--primary-light)) !important;
    border: none !important;
    border-radius: 20px !important;
    color: white !important;
    padding: 1.25rem 2rem !important;
    font-weight: 700 !important;
    font-size: 1.1rem !important;
    width: 100% !important;
    height: 64px;
    box-shadow: 0 12px 35px rgba(139, 92, 246, 0.4) !important;
    transition: all 0.3s ease !important;
    margin-bottom: 1rem !important;
    text-decoration: none !important;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
}

.confirm-btn:hover {
    transform: translateY(-3px) !important;
    box-shadow: 0 18px 45px rgba(139, 92, 246, 0.5) !important;
    color: white !important;
}

.cancel-btn {
    background: transparent !important;
    border: 2px solid var(--border) !important;
    border-radius: 20px !important;
    color: var(--text-secondary) !important;
    padding: 1rem 2rem !important;
    font-weight: 600 !important;
    width: 100% !important;
    height: 56px;
    transition: all 0.3s ease !important;
    text-decoration: none !important;
    display: flex;
    align-items: center;
    justify-content: center;
}

.cancel-btn:hover {
    background: var(--card-bg) !important;
    border-color: var(--primary) !important;
    color: var(--primary) !important;
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(139, 92, 246, 0.15);
}

/* Animations */
@keyframes floatIn {
    from {
        opacity: 0;
        transform: translateY(40px) scale(0.95);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

.auth-card {
    animation: floatIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

/* Responsive */
@media (max-width: 576px) {
    body {
        padding: 1rem;
    }
    
    .auth-card {
        padding: 2.5rem 2rem;
        margin: 1rem;
    }
    
    .confirm-title {
        font-size: 1.8rem;
    }
    
    .confirm-text {
        font-size: 1rem;
    }
}

/* Floating particles */
.auth-card::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    background-image: 
        radial-gradient(2px 2px at 20px 30px, rgba(139, 92, 246, 0.2), transparent),
        radial-gradient(2px 2px at 40px 70px, rgba(167, 139, 250, 0.2), transparent);
    pointer-events: none;
    animation: float 6s ease-in-out infinite;
    border-radius: 28px;
}

@keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
}
</style>
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <i class="fas fa-shield-check auth-icon"></i>
        <h3 class="confirm-title">Confirm Sign In</h3>
        <p class="confirm-text">
            You are about to sign in using your 
            <span class="provider-name">{{ provider.name }}</span> 
            account.
        </p>
        
        <form method="post">
            {% csrf_token %}
            <a href="#" class="btn confirm-btn" onclick="this.closest('form').submit();">
                <i class="fas fa-arrow-right"></i>
                Continue with {{ provider.name }}
            </a>
        </form>
        
        <a href="{% url 'account_login' %}" class="btn cancel-btn">
            <i class="fas fa-times me-2"></i>Cancel
        </a>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
