{% extends 'base.html' %}
{% block content %}
<h2>Delete SubTask</h2>
<p>Are you sure you want to delete the subtask "<strong>{{ subtask.title }}</strong>" of task "<strong>{{ subtask.parent_task.title }}</strong>"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'notes_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
