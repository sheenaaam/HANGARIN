{% extends 'base.html' %}
{% block content %}
<h2>Tasks</h2>
<a href="{% url 'task_create' %}" class="btn btn-primary mb-2">Add Task</a>
<table class="table table-bordered">
    <thead>
        <tr>
            <th>Title</th>
            <th>Status</th>
            <th>Deadline</th>
            <th>Category</th>
            <th>Priority</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for task in tasks %}
        <tr>
            <td>{{ task.title }}</td>
            <td>{{ task.status }}</td>
            <td>{{ task.deadline }}</td>
            <td>{{ task.category }}</td>
            <td>{{ task.priority }}</td>
            <td>
                <a href="{% url 'task_update' task.id %}" class="btn btn-sm btn-warning">Edit</a>
                <a href="{% url 'task_delete' task.id %}" class="btn btn-sm btn-danger">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="6">No tasks found.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
