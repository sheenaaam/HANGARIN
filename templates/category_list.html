{% extends 'base.html' %}
{% block content %}
<h2>Categories</h2>
<a href="{% url 'category_create' %}" class="btn btn-primary mb-2">Add Category</a>
<table class="table table-bordered">
    <thead>
        <tr>
            <th>Name</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for category in categories %}
        <tr>
            <td>{{ category.name }}</td>
            <td>
                <a href="{% url 'category_update' category.id %}" class="btn btn-sm btn-warning">Edit</a>
                <a href="{% url 'category_delete' category.id %}" class="btn btn-sm btn-danger">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="2">No categories found.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
