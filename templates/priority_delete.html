{% extends 'base.html' %}
{% block content %}
<h2>Delete Priority</h2>
<p>Are you sure you want to delete "{{ object.name }}"?</p>
<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'priority_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
